services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: signalroot
      POSTGRES_PASSWORD: signalroot
      POSTGRES_DB: signalroot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalroot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.1
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ─────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.go
      args:
        SERVICE: gateway
    ports:
      - "8080:8080"
    environment:
      GATEWAY_ADDR: ":8080"
      DATABASE_URL: postgres://signalroot:signalroot@postgres:5432/signalroot?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.go
      args:
        SERVICE: api
    ports:
      - "8081:8081"
    environment:
      API_ADDR: ":8081"
      DATABASE_URL: postgres://signalroot:signalroot@postgres:5432/signalroot?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      ML_SERVICE_URL: http://ml:8082
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.go
      args:
        SERVICE: worker
    environment:
      DATABASE_URL: postgres://signalroot:signalroot@postgres:5432/signalroot?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
      ML_SERVICE_URL: http://ml:8082
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ml:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    ports:
      - "8082:8082"
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: incident_dna
    depends_on:
      qdrant:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8081
    depends_on:
      - api

  # ─── Observability ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  qdrant_data:
  grafana_data:
